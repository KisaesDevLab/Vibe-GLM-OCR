name: Build OCR Server Image
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kisaesdevlab/vibe-glm-ocr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            suffix: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            suffix: "-cuda"
    name: build-${{ matrix.variant }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `suffix=<...>,onlatest=true` appends the suffix to every
          # generated tag including `:latest`. The CPU variant uses
          # the empty suffix and produces the canonical
          # `:latest` / `:vX.Y.Z` / `:sha-…` tags. The CUDA variant
          # produces `:latest-cuda` / `:vX.Y.Z-cuda` / `:sha-…-cuda`.
          flavor: |
            latest=true
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-variant cache scope so the CPU and CUDA builds don't
          # invalidate each other. Without `scope`, the second build
          # overwrites the first's GHA cache.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
          platforms: linux/amd64
